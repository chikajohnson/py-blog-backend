version: "3.9"

services:
  api:
    build: .
    ports:
      - "3001:3001"
    env_file: .env
    depends_on:
      - redis
    volumes:
      - ./uploads:/app/uploads

  # Uncomment to run a local PostgreSQL instance (set DB_MODE=local in .env)
  # db:
  #   image: postgres:16-alpine
  #   environment:
  #     POSTGRES_DB: pyflow
  #     POSTGRES_USER: pyflow_user
  #     POSTGRES_PASSWORD: changeme
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"


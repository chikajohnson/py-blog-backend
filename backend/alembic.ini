# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic
prepend_sys_path = .

# timezone to use when rendering the date within the migration file
# as well as the filename generated on output.
# string value is passed to dateutil.tz.gettz()
# leave blank for localtime
# timezone =

# max length of characters to in the 'slug' field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# offline_mode = true

# set to 'true' to allow .pyc and .pyo files without source
# to be detected as revisions (upgrade and downgrade operations)
# sourceless = false

# version location specification;
# valid options are: "relative:<dir>" (default) or "tag:<version>"
# version_locations = relative:alembic/versions

# version path separator;
# valid options are: "/" (unix), "\\" or "|" (windows)
# version_path_separator = ;

# set to 'true' to search source files recursively in the 'script_location' directory
# recursive_version_locations = false

# the output encoding used when revision files
# are written from script output
# output_encoding = utf-8

sqlalchemy.url = driver://user:pass@localhost/dbname


[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# on newly generated revision scripts.

# format using "black" -use the console_scripts entry point
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 -q

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
